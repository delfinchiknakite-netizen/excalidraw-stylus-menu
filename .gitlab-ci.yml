# CI для GitLab: на каждый git-тег vX.Y.Z собирает плагин и создаёт Release
# с прикреплёнными файлами main.js / manifest.json / styles.css.
stages:
  - build
  - release

build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
    - echo "BUILD_JOB_ID=$CI_JOB_ID" >> build.env
  artifacts:
    paths:
      - main.js
      - manifest.json
      - styles.css
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Создаю релиз $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Excalidraw Stylus Menu $CI_COMMIT_TAG"
    description: "Автосборка плагина для тега $CI_COMMIT_TAG"
    assets:
      links:
        - name: main.js
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID/artifacts/raw/main.js"
        - name: manifest.json
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID/artifacts/raw/manifest.json"
        - name: styles.css
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID/artifacts/raw/styles.css"
